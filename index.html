<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mohan Seetha</title>
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <meta
      name="description"
      content="Mohan Seetha portfolio showcasing selected projects, writing, and profile details."
    />
    <link rel="canonical" href="https://www.mohanss.tech/" />
    <meta property="og:title" content="Mohan Seetha" />
    <meta
      property="og:description"
      content="Explore Mohan Seetha's portfolio with selected projects, writing, and profile details."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.mohanss.tech/" />
    <meta
      property="og:image"
      content="https://www.mohanss.tech/src/assets/hero.webp"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mohan Seetha" />
    <meta
      name="twitter:description"
      content="Explore Mohan Seetha's portfolio with selected projects, writing, and profile details."
    />
    <meta
      name="twitter:image"
      content="https://www.mohanss.tech/src/assets/hero.webp"
    />

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Manrope:wght@200..800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="src/config/tailwind.config.js"></script>

    <link rel="stylesheet" href="src/css/styles.css" />
    <script src="src/js/data.js" defer></script>
    <script src="src/js/app.js" defer></script>
  </head>

  <body
    class="font-body selection:bg-secondary-container selection:text-on-secondary-container"
  >
    <header
      class="w-full md:min-h-screen flex items-center justify-center px-0 md:px-6 pt-14 pb-6 md:pt-0 md:pb-0 md:mb-14 bg-white"
    >
      <div
        class="w-full max-w-3xl mx-auto flex flex-col items-center justify-center text-center"
      >
        <div
          class="w-full px-4 sm:px-5 md:px-0 pb-2 md:pb-0 mb-0 md:mb-8 flex justify-center"
        >
          <img
            alt=""
            class="w-full max-w-[430px] sm:max-w-[500px] md:max-w-[570px] h-auto object-contain mx-auto"
            id="hero-image"
            src=""
          />
        </div>
        <div class="space-y-1 md:space-y-2">
          <h1
            class="font-signature text-2xl sm:text-4xl md:text-5xl text-on-surface"
            id="hero-name"
          ></h1>
          <p
            class="font-headline text-[11px] sm:text-sm md:text-base text-on-surface-variant flex flex-wrap items-center justify-center gap-1.5 sm:gap-3"
            id="hero-subtitle"
          ></p>
        </div>
      </div>
    </header>

    <main class="bg-white">
      <section
        class="max-w-3xl mx-auto px-5 sm:px-6 pt-2 pb-5 md:py-14"
        id="about"
      >
        <p class="typo-section-label mb-2" id="about-label"></p>

        <div>
          <h2 class="typo-section-title" id="about-title"></h2>
          <p class="typo-body mt-3 mb-3" id="about-description"></p>
        </div>

        <div class="mt-3 md:mt-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-12 w-full">
            <div class="space-y-3">
              <h3
                class="typo-subsection-title border-b border-outline-variant/30 pb-1"
                id="experience-title"
              ></h3>
              <div class="space-y-4" id="experience-list"></div>
            </div>
            <div class="space-y-3">
              <h3
                class="typo-subsection-title border-b border-outline-variant/30 pb-1"
                id="education-title"
              ></h3>
              <div class="space-y-4" id="education-list"></div>
            </div>
          </div>
        </div>
      </section>

      <section
        class="max-w-3xl mx-auto px-5 sm:px-6 py-5 md:py-14 flex flex-col justify-start"
        id="projects"
      >
        <div class="flex flex-col mb-3 md:mb-5">
          <p class="typo-section-label mb-2" id="projects-label"></p>
          <h2 class="typo-section-title" id="projects-title"></h2>
        </div>
        <div
          class="grid grid-cols-1 md:grid-cols-2 gap-x-6 md:gap-x-8 gap-y-3 md:gap-y-6 border-t border-gray-100 pt-2"
          id="projects-grid"
        ></div>
      </section>

      <section
        class="max-w-3xl mx-auto px-5 sm:px-6 py-5 md:pt-14 md:pb-8 flex flex-col justify-start gap-0"
        id="publications"
      >
        <div class="flex flex-col md:flex-row gap-4 md:gap-14 mb-5 md:mb-16">
          <div class="md:w-1/3">
            <p class="typo-section-label mb-2" id="discourse-label"></p>
            <h2 class="typo-section-title" id="discourse-title"></h2>
          </div>
          <div class="md:w-2/3">
            <div
              class="discourse-list mb-3 md:mb-0"
              id="publications-list"
            ></div>
          </div>
        </div>

        <footer class="pt-0 pb-0" id="social">
          <div class="flex flex-col items-center w-full gap-2 md:gap-8">
            <div
              class="w-full max-w-[430px] grid grid-cols-4 justify-items-center gap-x-3 sm:gap-x-4 gap-y-0"
              id="social-links"
            ></div>
            <p
              class="font-signature text-xl md:text-2xl text-[#4A443F]/85"
              id="footer-signature"
            ></p>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>
